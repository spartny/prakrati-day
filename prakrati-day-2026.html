<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prakrati Day 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #1a0f2e 0%, #0d1f0d 40%, #0a2a0a 100%);
    font-family: 'Crimson Text', serif;
    overflow-x: hidden;
    position: relative;
  }

  /* Starry bg dots */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,240,180,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,240,180,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(255,240,180,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 25%, rgba(255,240,180,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,240,180,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 60%, rgba(255,240,180,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 80%, rgba(200,255,200,0.4) 0%, transparent 100%);
    pointer-events:none; z-index:0;
  }

  /* Firefly particles */
  .firefly {
    position: fixed;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #c8ff80;
    box-shadow: 0 0 6px 2px #c8ff80, 0 0 14px 4px rgba(180,255,100,0.4);
    pointer-events: none;
    z-index: 1;
    animation: fireflyFloat linear infinite;
  }

  @keyframes fireflyFloat {
    0%   { transform: translate(0,0) scale(1); opacity:0; }
    10%  { opacity:1; }
    50%  { transform: translate(var(--dx), var(--dy)) scale(1.4); opacity:0.9; }
    90%  { opacity:0.6; }
    100% { transform: translate(var(--dx2), var(--dy2)) scale(0.8); opacity:0; }
  }

  /* Butterfly SVG animations */
  .butterfly {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    animation: butterflyFly linear infinite;
    transform-origin: center;
  }

  .butterfly svg { animation: wingFlap 0.35s ease-in-out infinite alternate; transform-origin: center; }

  @keyframes wingFlap {
    0%  { transform: scaleX(1); }
    100%{ transform: scaleX(0.3); }
  }

  @keyframes butterflyFly {
    0%   { transform: translate(var(--bx0), var(--by0)); opacity:0; }
    5%   { opacity:1; }
    25%  { transform: translate(var(--bx1), var(--by1)); }
    50%  { transform: translate(var(--bx2), var(--by2)); }
    75%  { transform: translate(var(--bx3), var(--by3)); }
    95%  { opacity:1; }
    100% { transform: translate(var(--bx4), var(--by4)); opacity:0; }
  }

  /* Floating leaves */
  .leaf {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: leafDrift linear infinite;
    opacity: 0.7;
    font-size: 1.2rem;
  }
  @keyframes leafDrift {
    0%  { transform: translate(0, -20px) rotate(0deg); opacity:0; }
    10% { opacity:0.8; }
    100%{ transform: translate(var(--lx), 110vh) rotate(var(--lr)); opacity:0; }
  }

  /* Mushroom row at bottom */
  .mushrooms {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    padding: 0 2vw;
    pointer-events: none;
    z-index: 3;
  }

  /* Main content */
  .container {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem 8rem;
    text-align: center;
  }

  /* Fairy dust ring around content */
  .glow-ring {
    position: relative;
    padding: 3rem 4rem;
    background: radial-gradient(ellipse, rgba(10,40,10,0.85) 0%, rgba(5,20,5,0.7) 100%);
    border: 2px solid rgba(180,255,100,0.2);
    border-radius: 50% 50% 40% 40% / 30% 30% 25% 25%;
    box-shadow:
      0 0 40px 10px rgba(100,220,50,0.08),
      inset 0 0 60px 10px rgba(10,60,10,0.4),
      0 0 0 1px rgba(180,255,100,0.05);
    max-width: 820px;
    width: 100%;
  }

  /* Decorative vines */
  .vine-top, .vine-bottom {
    font-size: 2.5rem;
    color: #4a8a20;
    text-shadow: 0 0 8px rgba(100,200,50,0.4);
    line-height: 1;
    letter-spacing: 0.2rem;
  }
  .vine-top { margin-bottom: 0.5rem; }
  .vine-bottom { margin-top: 0.5rem; }

  /* Title */
  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.6rem, 7vw, 5.5rem);
    font-weight: 700;
    color: transparent;
    background: linear-gradient(135deg, #a8ff60 0%, #f0ffb0 30%, #78e000 60%, #c8ff80 100%);
    -webkit-background-clip: text;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(160,255,80,0.5)) drop-shadow(0 0 40px rgba(100,200,30,0.3));
    line-height: 1.15;
    margin: 0.4rem 0;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    0%  { filter: drop-shadow(0 0 15px rgba(160,255,80,0.4)) drop-shadow(0 0 30px rgba(100,200,30,0.2)); }
    100%{ filter: drop-shadow(0 0 30px rgba(160,255,80,0.8)) drop-shadow(0 0 60px rgba(100,200,30,0.5)); }
  }

  .year {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: #c8ff80;
    letter-spacing: 0.5rem;
    opacity: 0.85;
    margin-bottom: 0.5rem;
  }

  /* Sub line */
  .sub {
    font-style: italic;
    font-size: 1.1rem;
    color: rgba(180,255,130,0.6);
    margin: 0.3rem 0 1.5rem;
    letter-spacing: 0.08rem;
  }

  /* Countdown */
  .countdown-wrapper { margin-top: 1.5rem; }

  .countdown-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.9rem;
    color: rgba(180,255,130,0.5);
    letter-spacing: 0.3rem;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .countdown {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .unit-val {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    color: #c8ff80;
    background: radial-gradient(ellipse at top, rgba(180,255,100,0.15), transparent 70%);
    border: 1px solid rgba(180,255,100,0.25);
    border-radius: 16px;
    padding: 0.4rem 1rem;
    min-width: 100px;
    text-align: center;
    box-shadow: 0 0 20px rgba(180,255,100,0.1), inset 0 0 20px rgba(0,40,0,0.3);
    text-shadow: 0 0 15px rgba(160,255,80,0.6);
    animation: pulse 2s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    0%  { box-shadow: 0 0 15px rgba(180,255,100,0.1), inset 0 0 20px rgba(0,40,0,0.3); }
    100%{ box-shadow: 0 0 30px rgba(180,255,100,0.25), inset 0 0 20px rgba(0,60,0,0.4); }
  }

  .unit-name {
    font-size: 0.75rem;
    letter-spacing: 0.25rem;
    color: rgba(180,255,130,0.5);
    text-transform: uppercase;
  }

  .separator {
    font-family: 'Cinzel Decorative', serif;
    font-size: 3rem;
    color: rgba(180,255,100,0.3);
    align-self: center;
    margin-top: -1rem;
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 50%{ opacity:0.2; } }

  /* Arrived message */
  .arrived {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: #f0ffb0;
    animation: titleGlow 1.5s ease-in-out infinite alternate;
    margin-top: 1rem;
  }

  /* Sparkles deco on the card */
  .sparkle {
    position: absolute;
    font-size: 1rem;
    animation: sparkleSpin 4s linear infinite;
    opacity: 0.6;
  }
  @keyframes sparkleSpin {
    0%  { transform: rotate(0deg) scale(1); opacity:0.6; }
    50% { transform: rotate(180deg) scale(1.4); opacity:1; }
    100%{ transform: rotate(360deg) scale(1); opacity:0.6; }
  }
</style>
</head>

<!-- Fireflies -->
<script>
(function(){
  const colors = ['#c8ff80','#a0ffb0','#e0ff80','#80ffcc'];
  for(let i=0;i<30;i++){
    const el = document.createElement('div');
    el.className='firefly';
    const x = Math.random()*100, y = Math.random()*100;
    const dx = (Math.random()-0.5)*300, dy = (Math.random()-0.5)*300;
    const dx2 = (Math.random()-0.5)*400, dy2 = (Math.random()-0.5)*400;
    el.style.cssText=`
      left:${x}vw; top:${y}vh;
      --dx:${dx}px; --dy:${dy}px;
      --dx2:${dx2}px; --dy2:${dy2}px;
      animation-duration:${4+Math.random()*6}s;
      animation-delay:${-Math.random()*8}s;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      box-shadow: 0 0 6px 2px ${colors[Math.floor(Math.random()*colors.length)]};
    `;
    document.body.appendChild(el);
  }
})();
</script>

<script>
  function pad(n){ return String(n).padStart(2,'0'); }

  // Always targets April 25 of the next upcoming year
  function getNextTarget() {
    const now = new Date();
    let year = now.getFullYear();
    let candidate = new Date(year, 3, 25, 0, 0, 0); // April 25
    if (now >= candidate) {
      // It's already past (or today is) April 25 this year — jump to next year
      candidate = new Date(year + 1, 3, 25, 0, 0, 0);
    }
    return candidate;
  }

  function applyArrivedTheme(year) {
    // Black theme takeover
    document.body.style.transition = 'background 1.5s ease';
    document.body.style.background = '#000000';
    document.body.style.color = '#ffffff';

    // Hide starry overlay
    const style = document.createElement('style');
    style.textContent = `
      body::before { display: none !important; }
      .firefly { display: none !important; }
      .leaf { display: none !important; }
      .mushrooms { display: none !important; }
      .butterfly { display: none !important; }
      .glow-ring {
        background: transparent !important;
        border-color: rgba(255,255,255,0.15) !important;
        box-shadow: 0 0 60px rgba(255,255,255,0.05) !important;
        border-radius: 20px !important;
      }
      .vine-top, .vine-bottom { color: rgba(255,255,255,0.25) !important; text-shadow: none !important; }
      .title {
        background: none !important;
        -webkit-background-clip: unset !important;
        background-clip: unset !important;
        color: #ffffff !important;
        filter: none !important;
        animation: none !important;
        text-shadow: 0 0 30px rgba(255,255,255,0.3) !important;
      }
      .year { color: rgba(255,255,255,0.6) !important; }
      .sub { color: rgba(255,255,255,0.35) !important; }
      .sparkle { display: none !important; }
      .countdown-label { color: rgba(255,255,255,0.4) !important; }
      .unit-val {
        color: #ffffff !important;
        border-color: rgba(255,255,255,0.2) !important;
        background: rgba(255,255,255,0.04) !important;
        text-shadow: 0 0 20px rgba(255,255,255,0.4) !important;
        box-shadow: 0 0 20px rgba(255,255,255,0.06) !important;
        animation: none !important;
      }
      .unit-name { color: rgba(255,255,255,0.4) !important; }
      .separator { color: rgba(255,255,255,0.2) !important; animation: blink 1s step-start infinite !important; }
      .arrived { color: #ffffff !important; animation: none !important; text-shadow: 0 0 20px rgba(255,255,255,0.5) !important; }
      .countdown-label#cd-label-arrived { color: rgba(255,255,255,0.4) !important; }
    `;
    document.head.appendChild(style);

    // Update year display
    document.getElementById('year-display').textContent = `✦ ${year} ✦`;
    document.title = `Prakrati Day ${year}`;

    // Show arrived message, hide countdown
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('cd-label').style.display = 'none';
    document.getElementById('arrived').style.display = 'block';
    document.getElementById('arrived').textContent = `🌸 Happy Prakrati Day ${year}! 🌸`;

    // After 24 hours window, start counting to next year
    setTimeout(() => {
      document.getElementById('arrived').style.display = 'none';
      document.getElementById('countdown').style.display = 'flex';
      document.getElementById('cd-label').style.display = 'block';
      startCountdown();
    }, 24 * 60 * 60 * 1000);
  }

  function startCountdown() {
    const target = getNextTarget();
    const targetYear = target.getFullYear();

    // Update title & year label
    document.getElementById('year-display').textContent = `✦ ${targetYear} ✦`;
    document.title = `Prakrati Day ${targetYear}`;

    function tick() {
      const now = Date.now();
      const diff = target.getTime() - now;

      if (diff <= 0) {
        applyArrivedTheme(targetYear);
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      document.getElementById('days').textContent = pad(d);
      document.getElementById('hours').textContent = pad(h);
      document.getElementById('minutes').textContent = pad(m);
      document.getElementById('seconds').textContent = pad(s);

      setTimeout(tick, 1000);
    }
    tick();
  }

  startCountdown();
</script>
